<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Dashboard</title>
    <style>
        :root {
            --bg: #0b0d11;
            --surface: #13161b;
            --surface-2: #1a1f26;
            --border: #252b36;
            --text: #e8eaed;
            --text-dim: #8b95a5;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px; background: var(--surface); border-right: 1px solid var(--border);
            padding: 24px 16px; flex-shrink: 0;
        }
        .sidebar h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
        .sidebar h1 span { color: var(--accent); }
        .nav-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-dim); font-size: 14px; margin-bottom: 4px;
            transition: all .15s;
        }
        .nav-item:hover, .nav-item.active { background: var(--surface-2); color: var(--text); }
        .nav-item.active { color: var(--accent); }
        .main { flex: 1; padding: 32px; max-width: 1000px; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; margin-bottom: 20px;
        }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
        .form-group { flex: 1; min-width: 160px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface-2); color: var(--text); font-size: 14px; outline: none;
            transition: border .15s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        .btn {
            padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all .15s; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .results { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: none; }
        .result-card { padding: 16px; border-bottom: 1px solid var(--border); }
        .result-card:last-child { border-bottom: none; }
        .result-card h3 { font-size: 15px; margin-bottom: 4px; }
        .result-card .meta { font-size: 13px; color: var(--text-dim); }
        .result-card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface-2); color: var(--text-dim); }
        .score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .score-hot { background: #22c55e20; color: var(--green); }
        .score-warm { background: #eab30820; color: var(--yellow); }
        .score-cool { background: #ef444420; color: var(--red); }
        .spinner { display: none; width: 20px; height: 20px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .score-bar { height: 6px; background: var(--surface-2); border-radius: 3px; margin: 12px 0; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; transition: width .5s; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        pre { font-size: 13px; color: var(--text-dim); white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h1>📊 <span>Lead</span>Dashboard</h1>
        <div class="nav-item active" data-tab="search">🔍 Search Companies</div>
        <div class="nav-item" data-tab="qualify">🎯 Qualify Lead</div>
        <div class="nav-item" data-tab="enrich">🏢 Enrich Company</div>
    </div>

    <div class="main">
        <!-- Search Companies -->
        <div id="tab-search" class="tab-content">
            <div class="card">
                <div class="card-title">🔍 Search Companies</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Industry</label>
                        <input type="text" id="s-industry" placeholder="e.g. cybersecurity, SaaS" list="industry-list">
                        <datalist id="industry-list">
                            <option value="Cybersecurity"><option value="SaaS"><option value="Fintech">
                            <option value="Healthcare"><option value="E-commerce"><option value="AI/ML">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>Min Employees</label>
                        <input type="number" id="s-min-emp" placeholder="50" min="1">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="s-location" placeholder="e.g. United States">
                    </div>
                    <div class="form-group">
                        <label>Keywords</label>
                        <input type="text" id="s-keywords" placeholder="e.g. channel, partner">
                    </div>
                    <button class="btn btn-primary" onclick="searchCompanies()">Search</button>
                </div>
            </div>
            <div id="s-results" class="results card"></div>
            <div id="s-spinner" class="spinner"></div>
        </div>

        <!-- Qualify Lead -->
        <div id="tab-qualify" class="tab-content" style="display:none">
            <div class="card">
                <div class="card-title">🎯 Qualify a Lead</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="q-company" placeholder="e.g. CrowdStrike">
                    </div>
                    <div class="form-group">
                        <label>Domain (optional)</label>
                        <input type="text" id="q-domain" placeholder="e.g. crowdstrike.com">
                    </div>
                    <button class="btn btn-primary" onclick="qualifyLead()">Score</button>
                </div>
            </div>
            <div id="q-results" class="results card"></div>
            <div id="q-spinner" class="spinner"></div>
        </div>

        <!-- Enrich Company -->
        <div id="tab-enrich" class="tab-content" style="display:none">
            <div class="card">
                <div class="card-title">🏢 Enrich Company Profile</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Domain</label>
                        <input type="text" id="e-domain" placeholder="e.g. crowdstrike.com">
                    </div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="e-company" placeholder="e.g. CrowdStrike">
                    </div>
                    <button class="btn btn-primary" onclick="enrichCompany()">Enrich</button>
                </div>
            </div>
            <div id="e-results" class="results card"></div>
            <div id="e-spinner" class="spinner"></div>
        </div>
    </div>
</div>

<script>
// Tab switching
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        item.classList.add('active');
        document.getElementById('tab-' + item.dataset.tab).style.display = 'block';
    });
});

function showSpinner(tab) { document.getElementById(tab + '-spinner').style.display = 'block'; }
function hideSpinner(tab) { document.getElementById(tab + '-spinner').style.display = 'none'; }
function showResults(tab, html) {
    const el = document.getElementById(tab + '-results');
    el.innerHTML = html;
    el.style.display = 'block';
}

async function apiCall(endpoint, body) {
    const resp = await fetch('/api/' + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    return await resp.json();
}

async function searchCompanies() {
    showSpinner('s');
    const data = await apiCall('search-companies', {
        industry: document.getElementById('s-industry').value || undefined,
        min_employees: parseInt(document.getElementById('s-min-emp').value) || undefined,
        location: document.getElementById('s-location').value || undefined,
        keywords: document.getElementById('s-keywords').value || undefined
    });
    hideSpinner('s');
    if (data.html) showResults('s', data.html);
    else showResults('s', `<pre>${data.error || 'No results'}</pre>`);
}

async function qualifyLead() {
    showSpinner('q');
    const data = await apiCall('qualify-lead', {
        company: document.getElementById('q-company').value,
        domain: document.getElementById('q-domain').value || undefined
    });
    hideSpinner('q');
    if (data.html) showResults('q', data.html);
    else showResults('q', `<pre>${data.error || 'No results'}</pre>`);
}

async function enrichCompany() {
    showSpinner('e');
    const data = await apiCall('enrich-company', {
        domain: document.getElementById('e-domain').value || undefined,
        company: document.getElementById('e-company').value || undefined
    });
    hideSpinner('e');
    if (data.html) showResults('e', data.html);
    else showResults('e', `<pre>${data.error || 'No results'}</pre>`);
}
</script>
</body>
</html>
